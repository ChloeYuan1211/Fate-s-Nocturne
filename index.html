<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>命运夜曲 Fate’s Nocturne</title>
<style>
:root {
  --main-pink: #f4a9aa;
  --light-pink: #ffe7e8;
  --dark-text: #b0484a;
  --r-tag: #7398d8;
  --sr-tag: #7ebd64;
  --ssr-tag: #e6b145;
  --gift-tag: #e86666;
  --white: #ffffff;
  --red-num: #e62c2c;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
  font-size: 14px;
}
body {
  background: var(--light-pink);
  padding: 12px;
  min-height: 100vh;
}
/* 页面大标题 */
.site-title {
  text-align: center;
  padding: 16px 12px;
  background: linear-gradient(120deg, var(--main-pink), #f8c9ca);
  border-radius: 14px;
  margin-bottom: 16px;
}
.site-title h1 {
  font-size: 22px;
  color: var(--dark-text);
  letter-spacing: 1px;
}
/* Tab导航栏 */
.tab-nav {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
}
.tab-btn {
  flex: 1;
  padding: 10px 0;
  border: none;
  border-radius: 10px;
  background: #fff;
  color: #777;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s ease;
}
.tab-btn.active {
  background: var(--main-pink);
  color: white;
}
/* Tab内容容器，默认隐藏非当前页面 */
.tab-content {
  display: none;
  background: var(--white);
  border-radius: 14px;
  padding: 16px;
}
.tab-content.show {
  display: block;
}
/* 通用卡片小标题 */
.sub-title {
  font-size: 17px;
  color: var(--dark-text);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--light-pink);
}
/* 总览统计网格 */
.stat-wrap {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}
.stat-card {
  background: var(--light-pink);
  padding: 14px 8px;
  border-radius: 10px;
  text-align: center;
}
.stat-card .num {
  display: block;
  font-size: 20px;
  font-weight: bold;
  color: var(--dark-text);
  margin-top: 4px;
}
/* 卡牌明细区块 */
.detail-block {
  margin-bottom: 16px;
}
.detail-block h4 {
  font-size: 15px;
  color: var(--dark-text);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.detail-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 7px;
}
.detail-item {
  padding: 6px 8px;
  border-radius: 8px;
  background: #fcf0f1;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}
.count-badge {
  color: var(--red-num);
  font-weight: bold;
  font-size: 13px;
}
/* 抽卡录入区域 */
.draw-num-select {
  width: 100%;
  padding: 8px;
  border: 1px solid var(--main-pink);
  border-radius: 8px;
  margin: 8px 0 14px;
}
.draw-input-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 9px;
  margin-bottom: 16px;
}
.draw-input-grid select {
  width: 100%;
  padding: 7px;
  border: 1px solid #ddd;
  border-radius: 8px;
}
.save-btn {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: var(--main-pink);
  color: white;
  font-weight: bold;
  cursor: pointer;
}
/* 历史表格 */
.table-top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.clear-all-btn {
  padding: 7px 12px;
  border: none;
  border-radius: 8px;
  background: #e86666;
  color: white;
  cursor: pointer;
}
.history-table {
  width: 100%;
  border-collapse: collapse;
}
.history-table th {
  background: var(--main-pink);
  color: white;
  padding: 9px 4px;
  font-size: 12px;
}
.history-table td {
  padding: 9px 4px;
  border-bottom: 1px solid #f8d7d8;
  font-size: 12px;
  text-align: center;
}
.history-table tr:nth-child(even) {
  background: var(--light-pink);
}
/* 稀有度标签 */
.tag {
  padding: 2px 7px;
  border-radius: 12px;
  color: white;
  font-size: 11px;
}
.tag-R { background: var(--r-tag); }
.tag-SR { background: var(--sr-tag); }
.tag-SSR { background: var(--ssr-tag); }
.tag-Gift { background: var(--gift-tag); }
.del-one {
  padding: 3px 7px;
  border: none;
  border-radius: 6px;
  background: #f7c2c3;
  color: var(--dark-text);
  cursor: pointer;
  font-size: 11px;
}
</style>
</head>
<body>
<div class="site-title">
  <h1>命运夜曲 Fate’s Nocturne</h1>
</div>

<!-- Tab切换导航 -->
<div class="tab-nav">
  <button class="tab-btn active" data-tab="overview">数据总览</button>
  <button class="tab-btn" data-tab="draw">录入抽卡</button>
  <button class="tab-btn" data-tab="history">历史记录</button>
</div>

<!-- Tab1：数据总览（新增卡牌持有明细区域） -->
<div class="tab-content show" id="overview">
  <h2 class="sub-title">全部抽卡数据汇总</h2>
  <div class="stat-wrap">
    <div class="stat-card">
      总抽取次数
      <span class="num" id="totalDraw">0</span>
    </div>
    <div class="stat-card">
      R卡牌
      <span class="num" id="rTotal">0</span>
    </div>
    <div class="stat-card">
      SR卡牌
      <span class="num" id="srTotal">0</span>
    </div>
    <div class="stat-card">
      SSR卡牌
      <span class="num" id="ssrTotal">0</span>
    </div>
    <div class="stat-card">
      周边奖品
      <span class="num" id="giftTotal">0</span>
    </div>
  </div>

  <h2 class="sub-title">卡牌持有明细（每张拥有数量）</h2>
  <!-- R卡明细 -->
  <div class="detail-block">
    <h4><span class="tag tag-R">R</span> R类UNO卡牌</h4>
    <div class="detail-list" id="listR"></div>
  </div>
  <!-- SR卡明细 -->
  <div class="detail-block">
    <h4><span class="tag tag-SR">SR</span> SR类卡牌</h4>
    <div class="detail-list" id="listSR"></div>
  </div>
  <!-- SSR卡明细 -->
  <div class="detail-block">
    <h4><span class="tag tag-SSR">SSR</span> SSR卡牌</h4>
    <div class="detail-list" id="listSSR"></div>
  </div>
  <!-- 周边明细 -->
  <div class="detail-block">
    <h4><span class="tag tag-Gift">Gift</span> 特殊周边奖池</h4>
    <div class="detail-list" id="listGift"></div>
  </div>
</div>

<!-- Tab2：录入抽卡 -->
<div class="tab-content" id="draw">
  <h2 class="sub-title">记录本次抽取卡牌</h2>
  <label>本次抽取数量（1~10抽）</label>
  <select class="draw-num-select" id="drawCount">
    <option value="1">1抽</option>
    <option value="2">2抽</option>
    <option value="3">3抽</option>
    <option value="4">4抽</option>
    <option value="5">5抽</option>
    <option value="6">6抽</option>
    <option value="7">7抽</option>
    <option value="8">8抽</option>
    <option value="9">9抽</option>
    <option value="10">10抽</option>
  </select>
  <div class="draw-input-grid" id="drawInputWrap"></div>
  <button class="save-btn" id="submitDraw">保存本次抽卡记录</button>
</div>

<!-- Tab3：历史流水 -->
<div class="tab-content" id="history">
  <div class="table-top-bar">
    <h2 class="sub-title">全部抽卡历史</h2>
    <button class="clear-all-btn" id="clearAll">清空所有记录</button>
  </div>
  <table class="history-table">
    <thead>
      <tr>
        <th>抽取时间</th>
        <th>稀有分类</th>
        <th>物品名称</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="historyList"></tbody>
  </table>
</div>

<script>
// 杨博文完整奖池卡牌
const cardData = {
  R: [
    "UNO-0",
    "UNO-1",
    "UNO-2",
    "UNO-3",
    "UNO-4",
    "UNO-5",
    "UNO-6",
    "UNO-7",
    "UNO-8",
    "UNO-9",
    "UNO-+2",
    "UNO - 转向",
    "UNO - 禁止"
  ],
  SR: [
    "UNO-+4",
    "UNO - 转色",
    "实物 - 镭射超能力卡",
    "实物 - 烫金超能力卡",
    "实物 - 镭射解脱卡",
    "实物 - 烫色解脱卡",
    "实物 - 镭射相遇卡",
    "实物 - 烫色相遇卡"
  ],
  SSR: [
    "重工明信片"
  ],
  Gift: [
    "【特殊奖池-官周】官周生娃",
    "【特殊奖池-官周】生周",
    "【特殊奖池-官周】荣耀之战线上",
    "【特殊奖池-官周】奔跑四",
    "【特殊奖池-组周】啵浪",
    "【特殊奖池-组周】啵唧啵咪",
    "【特殊奖池-组周】冰霸杯",
    "【特殊奖池-组周】粉帽",
    "【特殊奖池-组周】魔改棒",
    "【特殊奖池-组周】头灯",
    "【特殊奖池-其它】iPad 11 A16",
    "【特殊奖池-其它】大疆Pocket4",
    "【特殊奖池-其它】mini12拍立得",
    "【特殊奖池-其它】雅诗兰黛护肤六件套",
    "【特殊奖池-其它】金片",
    "【特殊奖池-其它】京东1000元代金实体卡",
    "【特殊奖池-其它】杨博文同款-潘多拉艾莎戒指",
    "【特殊奖池-其它】杨博文同款-潘多拉项链",
    "【特殊奖池-其它】杨博文同款-敲敲快乐"
  ]
};

// 独立本地存储标识
const STORAGE_TOTAL = "yangbowen_tab_total";
const STORAGE_HISTORY = "yangbowen_tab_history";

// 初始化数据
let totalStat = JSON.parse(localStorage.getItem(STORAGE_TOTAL)) || {
  totalDraw:0, R:0, SR:0, SSR:0, Gift:0
};
let historyArr = JSON.parse(localStorage.getItem(STORAGE_HISTORY)) || [];

// Tab切换逻辑
const tabBtns = document.querySelectorAll(".tab-btn");
const tabContents = document.querySelectorAll(".tab-content");
tabBtns.forEach(btn => {
  btn.onclick = () => {
    const targetId = btn.dataset.tab;
    tabBtns.forEach(b => b.classList.remove("active"));
    tabContents.forEach(c => c.classList.remove("show"));
    btn.classList.add("active");
    document.getElementById(targetId).classList.add("show");
  }
});

// DOM元素
const drawCountSel = document.getElementById("drawCount");
const inputWrap = document.getElementById("drawInputWrap");
const submitBtn = document.getElementById("submitDraw");
const historyTbody = document.getElementById("historyList");
const clearAllBtn = document.getElementById("clearAll");

// 明细容器
const listR = document.getElementById("listR");
const listSR = document.getElementById("listSR");
const listSSR = document.getElementById("listSSR");
const listGift = document.getElementById("listGift");

// 生成卡牌下拉
function createSelect() {
  const sel = document.createElement("select");
  Object.keys(cardData).forEach(type => {
    cardData[type].forEach(name => {
      const opt = document.createElement("option");
      opt.value = JSON.stringify({type, name});
      opt.textContent = `[${type}] ${name}`;
      sel.appendChild(opt);
    })
  })
  return sel;
}

// 刷新抽卡输入框
function refreshDrawInput() {
  inputWrap.innerHTML = "";
  const num = Number(drawCountSel.value);
  for(let i=0; i<num; i++) inputWrap.appendChild(createSelect());
}

// 更新顶部总统计数字
function refreshStat() {
  document.getElementById("totalDraw").innerText = totalStat.totalDraw;
  document.getElementById("rTotal").innerText = totalStat.R;
  document.getElementById("srTotal").innerText = totalStat.SR;
  document.getElementById("ssrTotal").innerText = totalStat.SSR;
  document.getElementById("giftTotal").innerText = totalStat.Gift;
}

// 自然排序函数：数字优先，UNO-0 < UNO-1 < UNO-2 < UNO-9 < UNO-+2
function naturalSortStr(a, b) {
  return a.localeCompare(b, undefined, { numeric: true, sensitivity: "base" });
}

// 统计每张卡牌出现次数并渲染明细列表（新增自然排序）
function renderCardDetail() {
  listR.innerHTML = "";
  listSR.innerHTML = "";
  listSSR.innerHTML = "";
  listGift.innerHTML = "";

  const countMap = {};
  historyArr.forEach(item => {
    const key = `${item.type}|${item.name}`;
    countMap[key] = (countMap[key] || 0) + 1;
  });

  // 按类型分组
  const group = { R:[], SR:[], SSR:[], Gift:[] };
  Object.entries(countMap).forEach(([key, count]) => {
    const [type, name] = key.split("|");
    group[type].push({ name, count });
  });

  // 每组内部按卡牌名称自然升序排序
  group.R.sort((x,y) => naturalSortStr(x.name, y.name));
  group.SR.sort((x,y) => naturalSortStr(x.name, y.name));
  group.SSR.sort((x,y) => naturalSortStr(x.name, y.name));
  group.Gift.sort((x,y) => naturalSortStr(x.name, y.name));

  // 渲染R卡
  group.R.forEach(item => {
    const itemDiv = document.createElement("div");
    itemDiv.className = "detail-item";
    itemDiv.innerHTML = `
      <span>${item.name}</span>
      <span class="count-badge">×${item.count}</span>
    `;
    listR.appendChild(itemDiv);
  });
  // 渲染SR卡
  group.SR.forEach(item => {
    const itemDiv = document.createElement("div");
    itemDiv.className = "detail-item";
    itemDiv.innerHTML = `
      <span>${item.name}</span>
      <span class="count-badge">×${item.count}</span>
    `;
    listSR.appendChild(itemDiv);
  });
  // 渲染SSR卡
  group.SSR.forEach(item => {
    const itemDiv = document.createElement("div");
    itemDiv.className = "detail-item";
    itemDiv.innerHTML = `
      <span>${item.name}</span>
      <span class="count-badge">×${item.count}</span>
    `;
    listSSR.appendChild(itemDiv);
  });
  // 渲染周边
  group.Gift.forEach(item => {
    const itemDiv = document.createElement("div");
    itemDiv.className = "detail-item";
    itemDiv.innerHTML = `
      <span>${item.name}</span>
      <span class="count-badge">×${item.count}</span>
    `;
    listGift.appendChild(itemDiv);
  });
}

// 渲染历史表格
function renderHistory() {
  historyTbody.innerHTML = "";
  historyArr.forEach((item, idx) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item.time}</td>
      <td><span class="tag tag-${item.type}">${item.type}</span></td>
      <td>${item.name}</td>
      <td><button class="del-one" data-i="${idx}">删除</button></td>
    `;
    historyTbody.appendChild(tr);
  })
  // 单条删除
  document.querySelectorAll(".del-one").forEach(b => {
    b.onclick = function(){
      const i = Number(this.dataset.i);
      const item = historyArr[i];
      totalStat[item.type] -= 1;
      totalStat.totalDraw -= 1;
      historyArr.splice(i, 1);
      saveData();
      refreshStat();
      renderHistory();
      renderCardDetail();
    }
  })
}

// 本地存储保存
function saveData() {
  localStorage.setItem(STORAGE_TOTAL, JSON.stringify(totalStat));
  localStorage.setItem(STORAGE_HISTORY, JSON.stringify(historyArr));
}

// 提交记录（无alert弹窗）
submitBtn.onclick = function(){
  const selects = inputWrap.querySelectorAll("select");
  const now = new Date().toLocaleString();
  selects.forEach(sel => {
    const data = JSON.parse(sel.value);
    totalStat.totalDraw += 1;
    totalStat[data.type] += 1;
    historyArr.unshift({time:now, type:data.type, name:data.name});
  })
  saveData();
  refreshStat();
  renderHistory();
  renderCardDetail();
}

// 清空全部记录
clearAllBtn.onclick = function(){
  if(!confirm("确定清空全部抽卡数据，无法恢复？")) return;
  totalStat = {totalDraw:0,R:0,SR:0,SSR:0,Gift:0};
  historyArr = [];
  saveData();
  refreshStat();
  renderHistory();
  renderCardDetail();
}

// 切换抽数刷新输入框
drawCountSel.addEventListener("change", refreshDrawInput);

// 页面初始化
refreshDrawInput();
refreshStat();
renderHistory();
renderCardDetail();
</script>
</body>
</html>
